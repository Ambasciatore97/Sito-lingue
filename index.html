<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impara lingue gratis | Quiz interattivi</title>
  <meta name="description" content="Allenati con quiz di inglese, francese e spagnolo. Migliora ogni giorno con livelli automatici e pronuncia audio.">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    h1 { text-align: center; }

    .progress-bar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      margin: 15px 0;
    }

    .progress {
      height: 10px;
      background: #2563eb;
      border-radius: 10px;
      width: 0%;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    select, input, button {
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .question {
      font-size: 22px;
      text-align: center;
      margin: 20px 0;
    }

    .result {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .container {
        margin: 10px;
      }
    }
  </style>
</head>

<body>
<div class="container">

  <h1>Impara le Lingue 🚀</h1>

  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>

  <div class="controls">
    <select id="lingua">
      <option value="en">Inglese</option>
      <option value="fr">Francese</option>
      <option value="es">Spagnolo</option>
    </select>
  </div>

  <div class="question" id="domanda"></div>

  <input type="text" id="risposta" placeholder="Scrivi la risposta" style="width:100%">

  <div class="controls">
    <button onclick="controlla()">Controlla</button>
    <button onclick="parla()">🔊</button>
  </div>

  <div class="result" id="risultato"></div>

  <p style="text-align:center">Livello: <span id="livello">1</span></p>

</div>

<script>
let livello = 1;
let corrette = 0;
let totale = 0;
let domandaCorrente;

const domande = [
  {it:"cane", en:"dog", fr:"chien", es:"perro"},
  {it:"gatto", en:"cat", fr:"chat", es:"gato"},
  {it:"casa", en:"house", fr:"maison", es:"casa"},
  {it:"acqua", en:"water", fr:"eau", es:"agua"},
  {it:"pane", en:"bread", fr:"pain", es:"pan"}
];

function nuovaDomanda(){
  const lingua = document.getElementById("lingua").value;
  domandaCorrente = domande[Math.floor(Math.random()*domande.length)];

  document.getElementById("domanda").innerText =
    "Traduci: " + domandaCorrente.it + " → (" + lingua + ")";
}

function controlla(){
  const lingua = document.getElementById("lingua").value;
  const risposta = document.getElementById("risposta").value.toLowerCase();

  totale++;

  if(risposta === domandaCorrente[lingua]){
    corrette++;
    document.getElementById("risultato").innerText = "✅ Corretto!";
  } else {
    document.getElementById("risultato").innerText =
      "❌ Sbagliato: " + domandaCorrente[lingua];
  }

  aggiornaLivello();
  aggiornaProgress();
  document.getElementById("risposta").value="";
  nuovaDomanda();
}

function aggiornaLivello(){
  if(corrette % 5 === 0){
    livello++;
    document.getElementById("livello").innerText = livello;
  }
}

function aggiornaProgress(){
  let perc = (corrette % 5) * 20;
  document.getElementById("progress").style.width = perc + "%";
}

function parla(){
  const lingua = document.getElementById("lingua").value;
  const speech = new SpeechSynthesisUtterance(domandaCorrente[lingua]);
  speech.lang = lingua;
  speechSynthesis.speak(speech);
}

nuovaDomanda();
</script>

</body>
</html>
